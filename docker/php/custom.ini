; ==============================================================
; Configuration PHP — WordPressBuilder
; Modifier les valeurs ici, puis redémarrer le conteneur :
;   docker compose restart wordpress
; ==============================================================

; Taille maximale d'un fichier uploadé (médias, thèmes, plugins)
upload_max_filesize = 2G

; Doit être >= upload_max_filesize
post_max_size       = 2G

; Mémoire allouée par requête PHP
memory_limit        = -1

; Durée maximale d'exécution d'un script (secondes)
max_execution_time  = 300

; Durée maximale d'attente des données POST/GET (secondes)
max_input_time      = 300
